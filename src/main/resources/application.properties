spring.application.name=concesionario-api

spring.mvc.static-path-pattern=/imagenes/**  
spring.resources.static-locations=file:/app/uploads/imagenes
spring.jackson.deserialization.fail-on-null-for-primitives=false

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

spring.datasource.url=jdbc:mysql://db:3306/concesionario?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=${MYSQL_USER:root}
spring.datasource.password=${MYSQL_PASSWORD:root}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

jwt.secret=${JWT_SECRET}
jwt.expiration-minutes=60